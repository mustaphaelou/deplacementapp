# Development overrides — merged on top of compose.yaml via:
#   docker compose -f compose.yaml -f compose.dev.yml up --build
# Adds a throwaway local database and mailpit. Never used in production.
services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=deplacementapp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d deplacementapp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/deplacementapp

  app:
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/deplacementapp
      - NEXTAUTH_SECRET=dev-secret-not-for-production-use
      - NEXTAUTH_URL=http://localhost:${PORT:-3000}
      - AUTH_TRUST_HOST=true
      - SMTP_HOST=mail
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=noreply@exemple.ma

  mail:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
